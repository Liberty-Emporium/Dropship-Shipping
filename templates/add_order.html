{% extends "base.html" %}

{% block title %}Add Order - Andy Shipping{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-cart-plus"></i> New Order</h2>
</div>

<form method="POST" class="card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="card-body">
        <h5 class="mb-3">Customer Information</h5>
        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label">Customer Name *</label>
                <input type="text" name="customer_name" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email *</label>
                <input type="email" name="customer_email" class="form-control" required>
            </div>
        </div>
        
        <h5 class="mb-3">Shipping Address</h5>
        <div class="row mb-4">
            <div class="col-12">
                <label class="form-label">Street Address</label>
                <input type="text" name="customer_address" class="form-control" required>
            </div>
            <div class="col-md-4 mt-2">
                <label class="form-label">City *</label>
                <input type="text" name="customer_city" class="form-control" required>
            </div>
            <div class="col-md-4 mt-2">
                <label class="form-label">State *</label>
                <input type="text" name="customer_state" class="form-control" required>
            </div>
            <div class="col-md-4 mt-2">
                <label class="form-label">ZIP Code *</label>
                <input type="text" name="customer_zip" class="form-control" required>
            </div>
        </div>
        
        <h5 class="mb-3">Product Details</h5>
        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label">Product Name *</label>
                <input type="text" name="product_name" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Price *</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="price" step="0.01" class="form-control" required>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" value="1" min="1" class="form-control">
            </div>
        </div>
        
        <h5 class="mb-3">Shipping</h5>
        <div class="row">
            <div class="col-md-6">
                <label class="form-label">Shipping Cost</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="shipping_cost" step="0.01" value="0" class="form-control">
                </div>
            </div>
        </div>
    </div>
    <div class="card-footer">
        <button type="submit" class="btn btn-primary">Create Order</button>
        <a href="/orders" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
