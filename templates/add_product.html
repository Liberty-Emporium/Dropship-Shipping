{% extends "base.html" %}

{% block title %}Add Product{% endblock %}

{% block content %}
<h2><i class="bi bi-plus-circle"></i> Add Product</h2>

<form method="POST" class="card mt-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="card-body">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Product Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">SKU *</label>
                <input type="text" name="sku" class="form-control" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Supplier</label>
                <select name="supplier" class="form-select">
                    <option value="">No Supplier</option>
                    {% for supplier in suppliers %}
                    <option value="{{ supplier.name }}">{{ supplier.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Cost</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="cost" step="0.01" class="form-control">
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Price</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="price" step="0.01" class="form-control">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Weight (lbs)</label>
                <input type="number" name="weight" step="0.01" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" value="0" class="form-control">
            </div>
        </div>
    </div>
    <div class="card-footer">
        <button type="submit" class="btn btn-primary">Add Product</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
