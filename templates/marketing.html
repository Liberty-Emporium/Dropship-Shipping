{% extends "base.html" %}
{% block title %}Marketing Tools{% endblock %}
{% block content %}
<h2><i class="bi bi-megaphone"></i> Marketing Tools</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">📝 AI Ad Generator</h5></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Product</label>
                    <input type="text" id="ad-product" class="form-control" placeholder="e.g., Wireless Mouse">
                </div>
                <div class="mb-3">
                    <label class="form-label">Platform</label>
                    <select id="ad-platform" class="form-select">
                        <option value="facebook">Facebook</option>
                        <option value="instagram">Instagram</option>
                        <option value="tiktok">TikTok</option>
                        <option value="google">Google Ads</option>
                    </select>
                </div>
                <button onclick="createAd()" class="btn btn-primary">Generate Ad</button>
                <div id="ad-result" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">📧 AI Email Writer</h5></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Email Type</label>
                    <select id="email-type" class="form-select">
                        <option value="welcome">Welcome Email</option>
                        <option value="promotional">Promotional</option>
                        <option value="follow-up">Cart Abandonment</option>
                    </select>
                </div>
                <button onclick="createEmail()" class="btn btn-success">Generate Email</button>
                <div id="email-result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
{% raw %}
function createAd() {
    document.getElementById('ad-result').innerHTML = '<p>Generating...</p>';
    fetch('/api/create-ad', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            product: document.getElementById('ad-product').value,
            platform: document.getElementById('ad-platform').value
        })
    }).then(r => r.json()).then(data => {
        document.getElementById('ad-result').innerHTML = '<pre class="bg-light p-3">' + data.ad + '</pre>';
    });
}
function createEmail() {
    document.getElementById('email-result').innerHTML = '<p>Generating...</p>';
    fetch('/api/create-email', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({type: document.getElementById('email-type').value})
    }).then(r => r.json()).then(data => {
        document.getElementById('email-result').innerHTML = '<pre class="bg-light p-3">' + data.email + '</pre>';
    });
}
{% endraw %}
</script>
{% endblock %}
