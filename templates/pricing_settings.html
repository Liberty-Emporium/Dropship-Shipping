{% extends "base.html" %}

{% block title %}Pricing Settings{% endblock %}

{% block content %}
<h2><i class="bi bi-currency-dollar"></i> Pricing Automation</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Price Rules</h5>
            </div>
            <div class="card-body">
                <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">Default Markup %</label>
                        <input type="number" name="default_markup" class="form-control" 
                               value="{{ settings.get('default_markup_percent', 50) }}">
                        <small class="text-muted">Added to product cost</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Minimum Profit %</label>
                        <input type="number" name="min_profit" class="form-control"
                               value="{{ settings.get('min_profit_percent', 20) }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Shipping Handling $</label>
                        <input type="number" name="shipping_handling" class="form-control"
                               value="{{ settings.get('shipping_handling', 5) }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Platform Fee %</label>
                        <input type="number" name="platform_fee" class="form-control"
                               value="{{ settings.get('platform_fee_percent', 2.9) }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Test Price Calculator</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Product Cost $</label>
                    <input type="number" id="test-cost" step="0.01" class="form-control">
                </div>
                <button onclick="calculate()" class="btn btn-success">Calculate</button>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
{% raw %}
function calculate() {
    const cost = document.getElementById('test-cost').value;
    fetch('/api/calculate-price', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({cost: parseFloat(cost)})
    }).then(r => r.json()).then(data => {
        document.getElementById('result').innerHTML = `
            <div class="alert alert-success">
                <strong>Selling Price: $${data.selling_price}</strong><br>
                Profit: $${data.profit.toFixed(2)} (${data.profit_percent}%)
            </div>
        `;
    });
}
{% endraw %}
</script>
{% endblock %}
