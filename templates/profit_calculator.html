{% extends "base.html" %}
{% block title %}Profit Calculator{% endblock %}
{% block content %}
<h2><i class="bi bi-calculator"></i> Profit Calculator</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Product Cost ($)</label>
                    <input type="number" id="product_cost" step="0.01" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Shipping Cost ($)</label>
                    <input type="number" id="shipping_cost" step="0.01" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Selling Price ($)</label>
                    <input type="number" id="selling_price" step="0.01" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Platform Fee %</label>
                    <input type="number" id="platform_fee" value="2.9" step="0.1" class="form-control">
                </div>
                <button onclick="calculate()" class="btn btn-success">Calculate</button>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h5>Results</h5></div>
            <div class="card-body" id="results">
                <p class="text-muted">Enter values and click Calculate</p>
            </div>
        </div>
    </div>
</div>

<script>
{% raw %}
function calculate() {
    fetch('/api/calculate-profit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            product_cost: parseFloat(document.getElementById('product_cost').value || 0),
            shipping_cost: parseFloat(document.getElementById('shipping_cost').value || 0),
            selling_price: parseFloat(document.getElementById('selling_price').value || 0),
            platform_fee: parseFloat(document.getElementById('platform_fee').value || 2.9),
            payment_processing: 2.9
        })
    }).then(r => r.json()).then(data => {
        document.getElementById('results').innerHTML = `
            <h3 class="${data.profit > 0 ? 'text-success' : 'text-danger'}">$${data.profit.toFixed(2)} Profit</h3>
            <hr>
            <p>Revenue: $${data.revenue.toFixed(2)}</p>
            <p>Total Cost: $${data.total_cost.toFixed(2)}</p>
            <p>Fees: $${data.fees.toFixed(2)}</p>
            <p>Profit Margin: ${data.profit_margin}%</p>
        `;
    });
}
{% endraw %}
</script>
{% endblock %}
