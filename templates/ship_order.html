{% extends "base.html" %}

{% block title %}Ship Order {{ order.id }}{% endblock %}

{% block content %}
<h2><i class="bi bi-truck"></i> Ship Order {{ order.id }}</h2>

<form method="POST" class="card mt-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">Carrier *</label>
            <select name="carrier" class="form-select" required>
                <option value="">Select Carrier</option>
                <option value="USPS">USPS</option>
                <option value="UPS">UPS</option>
                <option value="FedEx">FedEx</option>
                <option value="DHL">DHL</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Tracking Number *</label>
            <input type="text" name="tracking_number" class="form-control" required>
        </div>
    </div>
    <div class="card-footer">
        <button type="submit" class="btn btn-success">Mark as Shipped</button>
        <a href="/order/{{ order.id }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
