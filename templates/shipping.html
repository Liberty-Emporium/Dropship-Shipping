{% extends "base.html" %}

{% block title %}Shipping Calculator{% endblock %}

{% block content %}
<h2><i class="bi bi-truck"></i> Shipping Calculator</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Calculate Shipping Cost</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Package Weight (lbs)</label>
                    <input type="number" id="weight" step="0.1" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Distance (miles)</label>
                    <input type="number" id="distance" class="form-control">
                </div>
                <button onclick="calculateShipping()" class="btn btn-primary">Calculate</button>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Estimated Cost</h5>
            </div>
            <div class="card-body text-center">
                <h1 id="result" class="text-success">$0.00</h1>
                <p class="text-muted">Enter weight and distance to calculate</p>
            </div>
        </div>
    </div>
</div>

<script>
{% raw %}
function calculateShipping() {
    const weight = parseFloat(document.getElementById('weight').value) || 0;
    const distance = parseFloat(document.getElementById('distance').value) || 0;
    
    fetch('/api/calculate-shipping', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({weight, distance})
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('result').textContent = '$' + data.estimated_cost.toFixed(2);
    });
}
{% endraw %}
</script>
{% endblock %}
